<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Pozisyon Kodlama Görselleştiricisi</title>
    <meta name="theme-color" content="#4f46e5">
    <!-- Sadece tasarım için Tailwind CSS alıyoruz, başka hiçbir kütüphane veya React YOK -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background:
                radial-gradient(circle at top, rgba(79, 70, 229, 0.14), transparent 32%),
                radial-gradient(circle at 80% 10%, rgba(14, 165, 233, 0.12), transparent 24%),
                linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        }

        #posSlider::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 9999px;
            background: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.18);
        }

        #posSlider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border: 0;
            border-radius: 9999px;
            background: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.18);
        }
    </style>
</head>
<body class="min-h-screen font-sans text-slate-800 p-4 md:p-6 flex justify-center items-center">
    
    <div class="w-full max-w-5xl bg-white/90 backdrop-blur rounded-3xl shadow-2xl overflow-hidden border border-white/60 h-max">
        <!-- Üst Bilgi -->
        <div class="bg-gradient-to-r from-indigo-600 via-violet-600 to-sky-600 text-white p-6 md:p-8">
            <div class="flex flex-col gap-2">
                <p class="text-xs uppercase tracking-[0.35em] text-white/75">GitHub Pages hazır</p>
                <h1 class="text-2xl md:text-3xl font-bold">LLM Pozisyon Kodlama Görselleştiricisi</h1>
                <p class="text-white/85 max-w-2xl text-sm md:text-base">Geleneksel pozisyon ekleme ile RoPE yaklaşımını aynı sahnede karşılaştıran tek dosyalık HTML demo.</p>
            </div>
        </div>

        <!-- Kontroller -->
        <div class="p-6 border-b border-slate-200 bg-slate-50/80 flex flex-col md:flex-row gap-6 justify-between items-center">
            <div class="flex-1 w-full">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Kodlama Yöntemi</label>
                <div class="flex bg-slate-200 rounded-lg p-1">
                    <button id="btn-abs" onclick="setMethod('absolute')" class="flex-1 py-2 px-4 text-sm font-medium rounded-md transition-colors bg-white shadow text-indigo-700">Geleneksel PoE (Toplama)</button>
                    <button id="btn-rope" onclick="setMethod('rope')" class="flex-1 py-2 px-4 text-sm font-medium rounded-md transition-colors text-slate-600 hover:text-slate-800">RoPE (Döndürme)</button>
                </div>
            </div>
            <div class="flex-1 w-full">
                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    Kelime Pozisyonu (m): <span id="pos-label" class="text-indigo-600 text-lg">1</span>
                </label>
                <input type="range" id="posSlider" min="0" max="8" step="1" value="1" oninput="setPos(this.value)" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                <div class="flex justify-between text-xs text-slate-500 mt-1">
                    <span>0</span><span>8</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col xl:flex-row">
            <!-- SVG Çizim Alanı -->
            <div class="p-6 flex justify-center items-center bg-white border-b xl:border-b-0 xl:border-r border-slate-100">
                <svg id="main-svg" width="400" height="400" class="border border-slate-200 rounded-2xl bg-slate-50 shadow-inner max-w-full h-auto">
                    <defs>
                        <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
                        </marker>
                        <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                        </marker>
                        <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
                        </marker>
                    </defs>
                    <g id="svg-content"></g>
                </svg>
            </div>

            <!-- Analiz ve Matematik Paneli -->
            <div id="analysis-content" class="p-6 flex-1 bg-slate-50/70 flex flex-col gap-4 text-sm">
                <!-- Javascript ile Doldurulacak -->
            </div>
        </div>
    </div>

    <!-- SAF JAVASCRIPT KODLARI (Sıfır Hata Garantisi) -->
    <script>
        let currentMethod = 'absolute';
        let currentPos = 1;

        // --- MATEMATİKSEL SABİTLER ---
        const baseVector = { x: 1, y: 1 };
        const baseNorm = Math.sqrt(2);
        const baseAngle = Math.atan2(1, 1);

        const center = 200;
        const scale = 40;
        const mapX = (x) => center + x * scale;
        const mapY = (y) => center - y * scale;

        // --- BUTON VE KAYDIRICI KONTROLLERİ ---
        function setMethod(m) {
            currentMethod = m;
            document.getElementById('btn-abs').className = m === 'absolute' 
                ? 'flex-1 py-2 px-4 text-sm font-medium rounded-md transition-colors bg-white shadow text-indigo-700' 
                : 'flex-1 py-2 px-4 text-sm font-medium rounded-md transition-colors text-slate-600 hover:text-slate-800';
            
            document.getElementById('btn-rope').className = m === 'rope' 
                ? 'flex-1 py-2 px-4 text-sm font-medium rounded-md transition-colors bg-white shadow text-indigo-700' 
                : 'flex-1 py-2 px-4 text-sm font-medium rounded-md transition-colors text-slate-600 hover:text-slate-800';
            render();
        }

        function setPos(val) {
            currentPos = parseInt(val);
            document.getElementById('pos-label').innerText = currentPos;
            render();
        }

        // --- EKRAN ÇİZİM FONKSİYONU ---
        function render() {
            let finalVector = { x: 0, y: 0 };
            let posVector = { x: 0, y: 0 };
            let rotationDeg = 0;

            // Vektör Hesaplamaları
            if (currentMethod === 'absolute') {
                posVector = { x: 0.3 * currentPos, y: 0.2 * currentPos };
                finalVector = { x: baseVector.x + posVector.x, y: baseVector.y + posVector.y };
            } else {
                rotationDeg = currentPos * 30;
                const rad = rotationDeg * Math.PI / 180;
                finalVector = {
                    x: baseNorm * Math.cos(baseAngle + rad),
                    y: baseNorm * Math.sin(baseAngle + rad)
                };
            }

            const finalNorm = Math.sqrt(finalVector.x**2 + finalVector.y**2);

            // 1) SVG (Grafik) Güncelleme
            let svgHTML = '';
            for(let i=0; i<=10; i++) {
                let pos = i * scale;
                svgHTML += `<line x1="${pos}" y1="0" x2="${pos}" y2="400" stroke="#e2e8f0" stroke-width="1" />`;
                svgHTML += `<line x1="0" y1="${pos}" x2="400" y2="${pos}" stroke="#e2e8f0" stroke-width="1" />`;
            }
            svgHTML += `<line x1="0" y1="200" x2="400" y2="200" stroke="#94a3b8" stroke-width="2" />`;
            svgHTML += `<line x1="200" y1="0" x2="200" y2="400" stroke="#94a3b8" stroke-width="2" />`;

            svgHTML += `<line x1="${mapX(0)}" y1="${mapY(0)}" x2="${mapX(baseVector.x)}" y2="${mapY(baseVector.y)}" stroke="#3b82f6" stroke-width="3" stroke-dasharray="4 2" marker-end="url(#arrow-blue)" />`;
            svgHTML += `<text x="${mapX(baseVector.x)+10}" y="${mapY(baseVector.y)+20}" fill="#3b82f6" font-size="12" font-weight="bold">Orijinal (E)</text>`;

            if (currentPos > 0) {
                if (currentMethod === 'absolute') {
                    svgHTML += `<line x1="${mapX(baseVector.x)}" y1="${mapY(baseVector.y)}" x2="${mapX(finalVector.x)}" y2="${mapY(finalVector.y)}" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />`;
                } else {
                    svgHTML += `<path d="M ${mapX(baseVector.x)} ${mapY(baseVector.y)} A ${baseNorm*scale} ${baseNorm*scale} 0 0 0 ${mapX(finalVector.x)} ${mapY(finalVector.y)}" fill="transparent" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3 3" />`;
                }
                svgHTML += `<line x1="${mapX(0)}" y1="${mapY(0)}" x2="${mapX(finalVector.x)}" y2="${mapY(finalVector.y)}" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" />`;
                svgHTML += `<text x="${mapX(finalVector.x)+10}" y="${mapY(finalVector.y)-10}" fill="#ef4444" font-size="12" font-weight="bold">Sonuç Vektörü</text>`;
            }
            document.getElementById('svg-content').innerHTML = svgHTML;

            // 2) Matematiksel Analiz Paneli Güncelleme
            let analysisHTML = `
                <h3 class="text-lg font-bold text-slate-800 mb-2 border-b pb-2">Matematiksel Analiz</h3>
                <div class="bg-blue-50 text-blue-900 p-3 rounded-md border border-blue-100">
                    <span class="font-semibold block mb-1">Orijinal Vektör (E)</span>
                    Koordinat: [${baseVector.x.toFixed(2)}, ${baseVector.y.toFixed(2)}]<br/>
                    Uzunluk (Norm): <span class="font-bold">${baseNorm.toFixed(2)}</span>
                </div>
            `;

            if (currentMethod === 'absolute') {
                analysisHTML += `
                    <div class="bg-emerald-50 text-emerald-900 p-3 rounded-md border border-emerald-100">
                        <span class="font-semibold block mb-1">Eklenen Pozisyon Vektörü (P)</span>
                        Koordinat: [${posVector.x.toFixed(2)}, ${posVector.y.toFixed(2)}]<br/>
                        <span class="text-xs italic text-emerald-700">Formül: E + P</span>
                    </div>
                `;
            } else {
                analysisHTML += `
                    <div class="bg-amber-50 text-amber-900 p-3 rounded-md border border-amber-100">
                        <span class="font-semibold block mb-1">Rotasyon İşlemi</span>
                        Döndürme Açısı: ${rotationDeg}°<br/>
                        <span class="text-xs italic text-amber-700">Formül: R(E, ${rotationDeg}°)</span>
                    </div>
                `;
            }

            const borderClass = 'bg-red-50 text-red-900 border-red-100';
            const highlightClass = currentMethod === 'absolute' && currentPos > 0 ? 'bg-yellow-200 px-1 rounded' : 'bg-green-200 px-1 rounded';
            const warningMsg = currentMethod === 'absolute' 
                ? '<span class="text-red-700 font-medium">⚠️ Uyarı: Geleneksel yöntemde pozisyon eklendikçe vektörün boyu (norm) sürekli uzar ve kelimenin orijinal şiddeti bozulur.</span>'
                : '<span class="text-green-700 font-medium">✅ Avantaj: RoPE sadece döndürme yaptığı için vektörün uzunluğu daima sabit kalır. Şiddet bozulmaz!</span>';

            analysisHTML += `
                <div class="p-3 rounded-md border ${borderClass}">
                    <span class="font-semibold block mb-1">Sonuç Vektörü</span>
                    Koordinat: [${finalVector.x.toFixed(2)}, ${finalVector.y.toFixed(2)}]<br/>
                    Uzunluk (Norm): <span class="font-bold ${highlightClass}">${finalNorm.toFixed(2)}</span>
                    <div class="mt-3 text-xs border-t pt-2 border-red-200/50">
                        ${warningMsg}
                    </div>
                </div>
            `;
            
            document.getElementById('analysis-content').innerHTML = analysisHTML;
        }

        // Sayfa yüklenince ilk çizimi başlat
        render();
    </script>
</body>
</html>
